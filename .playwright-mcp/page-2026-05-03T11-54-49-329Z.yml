        - generic [ref=e37]: 岗位职责： 1、熟悉 Vue 3 技术栈（Composition API、Vue Router、Pinia），具备 TypeScript 开发能力。 2、熟悉 Vite 构建工具，了解环境变量、代理配置与构建优化。 3、熟悉 Element Plus 等 UI 组件库，能进行二次封装与业务适配。 4、熟悉 Axios 请求封装、拦截器与 RESTful 接口联调。 5、熟悉 ECharts 图表、vxe-table 等高性能表格组件，有大列表/报表开发经验。 6、熟悉 Sass、UnoCSS 等样式方案，具备前端工程化与 ESLint 规范意识。 7、有 WebSocket 实时通信、权限体系开发经验者优先。 8、有企业级中后台、B 端管理系统完整项目经验者优先。 9、有大文件上传、分片上传、多环境部署经验者优先。 10、了解 Docker 容器化部署，具备良好的编码规范与问题排查能力。 具备较强的学习能力，能快速适配AI技术，主动探索高效开发方式。 任职要求： 1、学历专业： 大专及以上学历，计算机、软件工程相关专业（基础扎实）； 2、框架熟练： 精通Vue3（Composition API）、Vue Router、Pinia，熟练使用TypeScript进行开发； 3、构建工具： 熟悉Vite，能独立配置环境变量、代理及基础构建优化； 4、UI/样式： 熟练使用Element Plus（能进行二次封装），掌握Sass、UnoCSS等现代样式方案； 5、网络请求： 熟悉Axios封装，能配合RESTful接口进行联调及拦截器处理； 6、组件能力： 熟悉ECharts及vxe-table，有大列表渲染、复杂报表开发经验； 7、规范意识： 具有良好的编码规范，了解前端工程化。 薪资待遇： 薪资：6000元/月起（根据能力具体面谈）
